name: 🔗 Check URLs
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Restore lychee cache
        uses: actions/cache@v6
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Link Checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # for v2.8.0
        with:
          fail: true
          args: >-
            --verbose
            --cache
            --max-cache-age 1d
            --no-progress
            --timeout=30
            --max-retries 2
            --accept 200,206,403,429
            './**/*.md' 